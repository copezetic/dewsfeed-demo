<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<!-- iPad kiosk: "Add to Home Screen" launches truly full-screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dews Feed">
<title>The Dews Feed</title>
<style>
  /* ══════════════════════════════════════════════════════════════════
     THE DEWS FEED — TICKER WALL (office edition · 100 Mason St)
     Pages: TOP STORY · SPORTS · MARKETS(+charts) · FLIGHTS RADAR ·
            BANKING · 7-DAY WEATHER · COMMUTE · GREENWICH · WORK TO-DO
     Breaking news + NWS warnings take over the full screen.
     ══════════════════════════════════════════════════════════════════ */
  :root{
    --ground:#07090f; --card:#0b0e17; --edge:#161b2a;
    --ink:#e8ecf4; --ink-dim:#8a93a8; --ink-faint:#4a5164;
    --amber:#ffb400; --cyan:#26d0e0; --blue:#3a7bff; --teal:#18c29c;
    --red:#ff4757; --green:#39d353; --purple:#c46bff; --yellow:#ffd23f;
    --up:#4ade5b; --down:#ff5a5a;
    --mono:ui-monospace,"Cascadia Mono",Consolas,"Courier New",monospace;
    --sans:"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{background:var(--ground);color:var(--ink);font-family:var(--sans);
       height:100vh;overflow:hidden;cursor:none;display:flex;flex-direction:column}
  body.mouse{cursor:auto}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;
    background-image:radial-gradient(circle at 1px 1px, rgba(0,0,0,.55) 1px, transparent 1px);
    background-size:3px 3px;opacity:.3}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

  #topbar{flex:0 0 auto;display:flex;align-items:center;gap:3vw;
          padding:1.2vh 2.2vw;border-bottom:2px solid var(--edge)}
  #wordmark{image-rendering:pixelated;flex:0 0 auto}
  #clock{font-family:var(--mono);font-weight:700;font-size:7vh;line-height:1;
         color:var(--amber);font-variant-numeric:tabular-nums;
         text-shadow:0 0 18px rgba(255,180,0,.45),0 0 46px rgba(255,180,0,.18)}
  #dateline{font-family:var(--mono);font-size:2.2vh;letter-spacing:.18em;
            color:var(--ink-dim);text-transform:uppercase;margin-top:.4vh}
  .top-wx{margin-left:auto;display:flex;gap:3vw;align-items:center}
  .wx-slot{text-align:right}
  .wx-slot .l{font-family:var(--mono);font-size:1.8vh;letter-spacing:.2em;color:var(--ink-dim)}
  .wx-slot .v{font-family:var(--mono);font-weight:700;font-size:5.4vh;line-height:1.1;
              font-variant-numeric:tabular-nums}
  .wx-slot .v .e{font-size:4.2vh}
  #wx1V{color:var(--cyan)} #wx2V{color:var(--amber)}
  #proxyDot{width:1.1vh;height:1.1vh;border-radius:50%;background:var(--ink-faint);flex:0 0 auto}
  #proxyDot.ok{background:var(--up);box-shadow:0 0 8px var(--up)}
  #proxyDot.warn{background:var(--yellow)}

  #spot{flex:1;display:flex;flex-direction:column;justify-content:center;
        padding:2vh 4vw;position:relative;min-height:0}
  #spotKicker{font-family:var(--mono);font-size:2.6vh;font-weight:700;letter-spacing:.3em;
              text-transform:uppercase;color:var(--acc,var(--amber));margin-bottom:1.6vh;
              display:flex;align-items:center;gap:1.2vw;flex:0 0 auto}
  #spotKicker .bar{display:inline-block;width:3.5vw;height:.7vh;background:var(--acc,var(--amber))}
  #spotBody{font-weight:700;font-size:7.2vh;line-height:1.14;text-wrap:balance;
            max-width:92vw;letter-spacing:-.01em;min-height:0;position:relative}
  #spotBody .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  #spotBody .up{color:var(--up)} #spotBody .down{color:var(--down)}
  #spotBody .gold{color:var(--amber)} #spotBody .dim{color:var(--ink-dim)}
  #spotBody .cy{color:var(--cyan)}
  #spotSub{font-family:var(--mono);font-size:2.6vh;color:var(--ink-dim);
           letter-spacing:.12em;margin-top:2vh;text-transform:uppercase;flex:0 0 auto}
  #spotDots{position:absolute;bottom:1.6vh;left:4vw;display:flex;gap:.8vw}
  #spotDots i{width:1.2vh;height:1.2vh;border-radius:50%;background:var(--edge)}
  #spotDots i.on{background:var(--amber)}
  /* 3D stage: pages rise out of depth instead of flat-fading */
  #spot{perspective:1400px}
  .fadein{animation:pageIn .9s cubic-bezier(.22,.9,.3,1) both;transform-style:preserve-3d}
  @keyframes pageIn{from{opacity:0;transform:translateY(6vh) translateZ(-320px) rotateX(10deg)}
                    to{opacity:1;transform:none}}
  @keyframes fade{from{opacity:0;transform:translateY(1.5vh)}to{opacity:1;transform:none}}
  @keyframes blink{50%{opacity:.25}}

  /* ── SPORTS: hero score + more-games rail ── */
  .sp-wrap{display:flex;flex-direction:column;gap:3vh}
  .score-row{display:flex;align-items:center;gap:2vw;font-family:var(--mono);
             font-variant-numeric:tabular-nums}
  .score-row img{height:13vh;width:13vh;object-fit:contain;
                 filter:drop-shadow(0 0 12px rgba(255,255,255,.12))}
  .score-row .num{font-size:10.5vh;font-weight:800;color:var(--amber)}
  .score-row .ab{font-size:4.6vh;color:var(--ink-dim)}
  .score-row .dash{font-size:7vh;color:var(--ink-faint)}
  .sp-rail{display:flex;gap:2.2vw}
  .sp-news{display:flex;flex-direction:column;gap:1vh;margin-top:.5vh}
  .sp-nw{display:flex;gap:1.2vw;align-items:baseline;font-size:2.9vh;font-weight:600;
         color:var(--ink);line-height:1.25}
  .sp-nw .b{color:var(--acc,var(--amber));font-family:var(--mono);font-weight:800;flex:0 0 auto}
  .sp-nw .s{color:var(--ink-faint);font-family:var(--mono);font-size:2vh;flex:0 0 auto}
  .sp-src{font-family:var(--mono);font-size:1.8vh;letter-spacing:.2em;color:var(--ink-faint)}
  .mini{display:flex;align-items:center;gap:.8vw;background:var(--card);
        border:1px solid var(--edge);border-radius:1vh;padding:1.2vh 1.2vw;
        font-family:var(--mono);font-size:2.8vh}
  .mini img{height:4.6vh;width:4.6vh;object-fit:contain}
  .mini .s{font-weight:800;color:var(--ink)}
  .mini .st{font-size:2vh;color:var(--ink-faint);margin-left:.5vw}
  .mini .live{color:var(--up);font-size:2vh;font-weight:800;animation:blink 1.2s infinite}

  /* ── MARKETS: dual chart panels + tile strip ── */
  .mk-wrap{display:flex;flex-direction:column;gap:2.2vh;width:90vw}
  .mk-charts{display:flex;gap:2.5vw}
  .mk-panel{flex:1;background:var(--card);border:1px solid var(--edge);border-radius:1.4vh;
            padding:2vh 1.6vw}
  .mk-panel .ml{font-family:var(--mono);font-size:2.2vh;letter-spacing:.22em;color:var(--ink-dim);
                display:flex;align-items:center;gap:.8vw}
  .mk-panel .ml img{height:3.6vh;width:3.6vh;border-radius:.6vh;object-fit:contain;background:#fff;padding:.3vh}
  .mk-panel .row{display:flex;align-items:baseline;gap:1.2vw;margin:.6vh 0}
  .mk-panel .mv{font-family:var(--mono);font-weight:800;font-size:7.5vh;line-height:1;
                font-variant-numeric:tabular-nums}
  .mk-panel .mc{font-family:var(--mono);font-size:3.2vh;font-weight:700}
  .mk-panel svg{display:block;width:100%;height:14vh}
  .mk-panel .nodata{font-family:var(--mono);color:var(--ink-faint);font-size:2.4vh;
                    height:14vh;display:flex;align-items:center}
  .mk-tiles{display:flex;gap:2.5vw}
  .mk-tile{flex:1;background:var(--card);border:1px solid var(--edge);border-radius:1.2vh;
           padding:1.4vh 1.4vw;font-family:var(--mono)}
  .mk-tile .ml{font-size:1.9vh;letter-spacing:.22em;color:var(--ink-dim)}
  .mk-tile .mv{font-weight:800;font-size:4.4vh;font-variant-numeric:tabular-nums}

  /* ── NEWS pages: hero headline + list of more ── */
  .nw-wrap{display:flex;flex-direction:column;gap:2.4vh;max-width:90vw}
  .nw-hero{font-weight:700;font-size:6.2vh;line-height:1.15;text-wrap:balance}
  .nw-list{display:flex;flex-direction:column;gap:1.5vh}
  .nw-item{display:flex;gap:1.4vw;align-items:baseline;font-size:3.4vh;font-weight:600;
           color:var(--ink);line-height:1.25}
  .nw-item .b{color:var(--acc,var(--amber));font-family:var(--mono);flex:0 0 auto;font-weight:800}
  .nw-item .s{color:var(--ink-faint);font-family:var(--mono);font-size:2.2vh;flex:0 0 auto}

  /* ── FLIGHTS radar ── */
  .fl-wrap{display:flex;align-items:center;gap:4vw;height:52vh}
  .radar{position:relative;height:52vh;width:52vh;flex:0 0 auto;border-radius:50%;
         background:radial-gradient(circle,#0a1626 0%,#070d18 70%,#060a12 100%);
         border:2px solid #17324e;overflow:hidden}
  .radar .ring{position:absolute;border-radius:50%;border:1px solid #123049;inset:0}
  .radar .ring.r2{inset:16.6%}.radar .ring.r3{inset:33.3%}
  .radar .cross{position:absolute;background:#0e2438}
  .radar .cross.h{left:0;right:0;top:50%;height:1px}
  .radar .cross.v{top:0;bottom:0;left:50%;width:1px}
  .radar .sweep{position:absolute;inset:0;border-radius:50%;
    background:conic-gradient(from 0deg, rgba(38,208,224,.28), transparent 18%);
    animation:sweep 6s linear infinite}
  @keyframes sweep{to{transform:rotate(360deg)}}
  .radar .home{position:absolute;width:1.4vh;height:1.4vh;
    background:var(--amber);border-radius:50%;transform:translate(-50%,-50%);
    box-shadow:0 0 10px var(--amber)}
  .radar .plane{position:absolute;font-size:3.6vh;line-height:1;
    transform:translate(-50%,-50%) rotate(var(--hdg));color:#9fc5e8;
    text-shadow:0 0 8px rgba(159,197,232,.7)}
  .radar .plane.near{color:var(--amber);font-size:4.6vh;
    text-shadow:0 0 12px rgba(255,180,0,.8)}
  .fl-info .cs{font-family:var(--mono);font-weight:800;font-size:7.5vh;color:var(--amber);line-height:1}
  .fl-info .al{font-family:var(--sans);font-weight:700;font-size:3.6vh;margin-top:.8vh}
  .fl-info .st{font-family:var(--mono);font-size:2.8vh;color:var(--ink-dim);margin-top:1.2vh;line-height:1.6}
  .fl-info .st b{color:var(--cyan);font-weight:700}
  .fl-photo{display:block;margin-top:1.6vh;width:30vw;max-height:24vh;object-fit:cover;
            border-radius:1.2vh;border:1px solid var(--edge)}
  .fl-credit{font-family:var(--mono);font-size:1.6vh;color:var(--ink-faint);margin-top:.6vh}

  /* ── page watermarks — big faint themed glyph, right side ── */
  .pg-wm{position:absolute;right:5vw;top:50%;transform:translateY(-50%);
         font-size:26vh;opacity:.09;pointer-events:none;line-height:1}

  /* ── commute mini-maps ── */
  .cm-map{display:block;margin-top:1.6vh;width:26vw;border-radius:1.2vh;
          border:1px solid var(--edge)}
  /* car cruises under the drive times (emoji faces left → right-to-left) */
  .cm-road{position:relative;margin-top:2.4vh;height:6.5vh;width:70vw;overflow:hidden}
  .cm-road::after{content:"";position:absolute;left:0;right:0;bottom:1vh;height:.35vh;
    background:repeating-linear-gradient(90deg,var(--ink-faint) 0 2.4vw,transparent 2.4vw 4vw);
    opacity:.5}
  .cm-anim{position:absolute;bottom:1.4vh;font-size:4.8vh;line-height:1;
    animation:carRun 9s linear infinite}
  @keyframes carRun{from{transform:translateX(72vw)}to{transform:translateX(-14vw)}}

  /* ══════ DEPTH SYSTEM — ambient field, float choreography, 3D tilts ══════ */
  #depth{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  /* low-specificity on purpose: must NOT beat #alert{position:fixed} etc. */
  body>:not([id="depth"]){position:relative;z-index:1}
  #depth i{position:absolute;left:-50vw;top:-120vh;width:200vw;height:340vh;
    background-image:radial-gradient(circle,rgba(160,190,255,.5) 0 1px,transparent 1.6px);
    background-size:7vw 9vh}
  #depth i.l1{opacity:.30;animation:driftUp 160s linear infinite}
  #depth i.l2{opacity:.18;background-size:12vw 16vh;animation:driftUp 300s linear infinite}
  @keyframes driftUp{to{transform:translateY(120vh)}}
  #depth b{position:absolute;border-radius:50%;filter:blur(6vh);opacity:.22}
  #depth b.o1{width:46vh;height:46vh;left:5vw;top:58vh;
    background:radial-gradient(circle,#2a5cff,transparent 70%);
    animation:orb 28s ease-in-out infinite alternate}
  #depth b.o2{width:38vh;height:38vh;right:8vw;top:10vh;
    background:radial-gradient(circle,#ffb400,transparent 70%);
    animation:orb 36s ease-in-out infinite alternate-reverse}
  #depth b.o3{width:30vh;height:30vh;right:32vw;bottom:2vh;
    background:radial-gradient(circle,#26d0e0,transparent 70%);
    animation:orb 44s ease-in-out infinite alternate}
  @keyframes orb{to{transform:translate(6vw,-6vh) scale(1.16)}}

  /* stagger index — set once, reused by every list/tile cascade */
  :is(.nw-item,.td,.fw-mt,.sp-nw,.tr,.mini,.wk,.wt,.mk-tile):nth-child(1){--i:0}
  :is(.nw-item,.td,.fw-mt,.sp-nw,.tr,.mini,.wk,.wt,.mk-tile):nth-child(2){--i:1}
  :is(.nw-item,.td,.fw-mt,.sp-nw,.tr,.mini,.wk,.wt,.mk-tile):nth-child(3){--i:2}
  :is(.nw-item,.td,.fw-mt,.sp-nw,.tr,.mini,.wk,.wt,.mk-tile):nth-child(4){--i:3}
  :is(.nw-item,.td,.fw-mt,.sp-nw,.tr,.mini,.wk,.wt,.mk-tile):nth-child(5){--i:4}
  :is(.nw-item,.td,.fw-mt,.sp-nw,.tr,.mini,.wk,.wt,.mk-tile):nth-child(6){--i:5}
  :is(.nw-item,.td,.fw-mt,.sp-nw,.tr,.mini,.wk,.wt,.mk-tile):nth-child(7){--i:6}
  :is(.nw-item,.td,.fw-mt,.sp-nw,.tr,.mini,.wk,.wt,.mk-tile):nth-child(8){--i:7}
  :is(.nw-item,.td,.fw-mt,.sp-nw,.tr,.mini,.wk,.wt,.mk-tile):nth-child(9){--i:8}
  :is(.nw-item,.td,.fw-mt,.sp-nw,.tr,.mini,.wk,.wt,.mk-tile):nth-child(10){--i:9}

  @keyframes riseIn{from{opacity:0;transform:translateY(2.5vh) translateZ(-60px)}
                    to{opacity:1;transform:none}}
  @keyframes float3d{from{transform:translateY(.9vh) rotateX(.8deg)}
                     to{transform:translateY(-.9vh) rotateX(-.8deg)}}
  /* list rows: cascade in */
  .nw-item,.td,.fw-mt,.sp-nw,.tr{
    animation:riseIn .55s cubic-bezier(.2,.8,.3,1) both;
    animation-delay:calc(var(--i,0)*.07s)}
  /* card tiles: cascade in, then float forever (staggered phase) */
  .mini,.wk,.wt,.mk-tile,.wh-tile{
    animation:riseIn .55s cubic-bezier(.2,.8,.3,1) both,
              float3d 7s ease-in-out calc(var(--i,0)*-1.9s + .6s) infinite alternate}
  /* card bevel + deep layered shadow */
  .mk-panel,.mk-tile,.mini,.wh-tile{
    box-shadow:0 1.2vh 3vh rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.07)}

  /* per-page hero depth */
  .mk-charts{perspective:1200px}
  .mk-panel:first-child{transform:rotateY(2.5deg)}
  .mk-panel:last-child{transform:rotateY(-2.5deg)}
  .score-row{perspective:900px}
  .score-row img{animation:coinTilt 4.5s ease-in-out infinite alternate}
  .score-row img:last-of-type{animation-delay:-2.2s}
  @keyframes coinTilt{from{transform:rotateY(-24deg)}to{transform:rotateY(24deg)}}
  .fl-wrap{perspective:1100px}
  .radar{transform:rotateX(10deg)}
  .wc-wrap{perspective:1100px}
  .wc{transform:rotateX(5deg)}
  .wc .face{animation:float3d 8s ease-in-out infinite alternate}
  .wc:nth-child(2) .face{animation-delay:-2s}
  .wc:nth-child(3) .face{animation-delay:-4s}
  .wc:nth-child(4) .face{animation-delay:-6s}
  .vb-wrap{transform-style:preserve-3d;
    animation:boardFloat 9s ease-in-out infinite alternate}
  @keyframes boardFloat{from{transform:rotateX(3deg) translateY(.4vh)}
                        to{transform:rotateX(5deg) translateY(-.4vh)}}
  .ap-img{animation:kenburns 28s ease-in-out infinite alternate}
  @keyframes kenburns{from{transform:scale(1)}to{transform:scale(1.07) translate(-1.2%,-1%)}}
  .mn-big{animation:moonFloat 9s ease-in-out infinite alternate}
  @keyframes moonFloat{from{transform:translateY(1.2vh)}to{transform:translateY(-1.2vh)}}
  .pg-wm{animation:wmFloat 10s ease-in-out infinite alternate}
  @keyframes wmFloat{from{transform:translateY(-46%) rotate(-3deg)}
                     to{transform:translateY(-54%) rotate(3deg)}}
  #spotKicker .bar{animation:barGlow 3s ease-in-out infinite alternate}
  @keyframes barGlow{from{box-shadow:0 0 5px var(--acc,var(--amber))}
                     to{box-shadow:0 0 16px var(--acc,var(--amber))}}

  /* ══════ SCENE SYSTEM — per-page animated backdrops + 3D hand-off ══════ */
  /* shooting stars in the ambient field */
  #depth s.shoot{position:absolute;top:12vh;left:-22vw;width:22vw;height:2px;
    border-radius:2px;opacity:0;transform:rotate(16deg);
    background:linear-gradient(90deg,transparent,rgba(200,220,255,.9));
    animation:shoot 9s linear infinite}
  #depth s.shoot.s2{top:34vh;animation-duration:13s;animation-delay:5s}
  @keyframes shoot{0%,86%{opacity:0;transform:rotate(16deg) translateX(0)}
    88%{opacity:1}96%,100%{opacity:0;transform:rotate(16deg) translateX(150vw)}}

  /* page backdrop stage: sits behind the spotlight content, theme per page */
  #pageBg{position:absolute;inset:-2vh -2vw;z-index:0;pointer-events:none;
    overflow:hidden;transition:opacity .6s;opacity:1}
  #spot>:not([id="pageBg"]):not([id="hud"]){position:relative;z-index:1}

  /* war-room HUD chrome: corner brackets, scanline, telemetry readout */
  #hud{position:absolute;inset:.5vh .6vw;z-index:2;pointer-events:none}
  #hud s{position:absolute;width:4.5vh;height:4.5vh;
    border:2px solid rgba(120,165,205,.35)}
  #hud s.c1{left:0;top:0;border-right:0;border-bottom:0}
  #hud s.c2{right:0;top:0;border-left:0;border-bottom:0}
  #hud s.c3{right:0;bottom:0;border-left:0;border-top:0}
  #hud s.c4{left:0;bottom:0;border-right:0;border-top:0}
  #hud i.scan{position:absolute;left:2%;right:2%;top:0;height:2px;display:block;
    background:linear-gradient(90deg,transparent,rgba(120,200,235,.22),transparent);
    animation:scanY 8s linear infinite}
  @keyframes scanY{from{transform:translateY(0)}to{transform:translateY(72vh)}}
  #hudTlm{position:absolute;right:1.2vw;bottom:.4vh;font-family:var(--mono);
    font-size:1.7vh;letter-spacing:.2em;color:var(--ink-faint)}
  #hudTlm b{color:#39d353;font-weight:400}
  #pageBg i,#pageBg em{position:absolute;inset:0;display:block}

  /* GRID — synthwave floor rushing toward a glowing horizon (markets/fed) */
  #pageBg.bg-grid{perspective:600px}
  #pageBg.bg-grid i{top:46%;height:220%;transform-origin:top center;opacity:.34;
    background:
      repeating-linear-gradient(90deg,rgba(90,140,255,.5) 0 2px,transparent 2px 7vw),
      repeating-linear-gradient(0deg,rgba(90,140,255,.5) 0 2px,transparent 2px 9vh);
    animation:gridRush 3.2s linear infinite}
  /* translate by exactly one row period → seamless loop, compositor-only */
  @keyframes gridRush{from{transform:rotateX(74deg) translateY(-9vh)}
                      to{transform:rotateX(74deg) translateY(0)}}
  #pageBg.bg-grid em{top:38%;height:26%;
    background:radial-gradient(ellipse 70% 100% at 50% 55%,rgba(80,130,255,.28),transparent 70%)}
  /* data skyline: green/red/amber columns rising behind the grid horizon */
  #pageBg.bg-grid::after{content:"";position:absolute;left:-20%;right:-20%;
    top:18%;height:28%;
    background:
      repeating-linear-gradient(90deg,rgba(57,211,83,.15) 0 1.6vw,transparent 1.6vw 2.6vw,
        rgba(57,211,83,.10) 2.6vw 3.4vw,transparent 3.4vw 5.6vw,
        rgba(255,90,90,.13) 5.6vw 6.6vw,transparent 6.6vw 8.8vw),
      repeating-linear-gradient(90deg,transparent 0 .8vw,rgba(255,180,0,.09) .8vw 1.4vw,
        transparent 1.4vw 4.1vw);
    -webkit-mask:linear-gradient(0deg,rgba(0,0,0,1),transparent 92%);
    mask:linear-gradient(0deg,rgba(0,0,0,1),transparent 92%);
    animation:skyDrift 40s linear infinite alternate}
  @keyframes skyDrift{from{transform:translateX(-3vw)}to{transform:translateX(3vw)}}

  /* BEAMS — cold searchlights sweeping (sports/quote) */
  #pageBg.bg-beams i{left:-18%;top:-58%;width:70%;height:200%;opacity:.2;
    background:conic-gradient(from 158deg at 18% 12%,transparent 0 12deg,
      rgba(170,210,245,.5) 16deg 22deg,transparent 26deg 34deg,
      rgba(170,210,245,.36) 38deg 43deg,transparent 47deg 360deg);
    transform-origin:18% 12%;animation:beamSweep 11s ease-in-out infinite alternate}
  #pageBg.bg-beams em{left:48%;top:-58%;width:70%;height:200%;opacity:.16;
    background:conic-gradient(from 202deg at 82% 12%,transparent 0 12deg,
      rgba(180,215,255,.5) 16deg 23deg,transparent 27deg 360deg);
    transform-origin:82% 12%;animation:beamSweep 13s ease-in-out infinite alternate-reverse}
  @keyframes beamSweep{from{transform:rotate(-9deg)}to{transform:rotate(9deg)}}

  /* SKY — soft drifting cloud banks (weather/moon/clock/apod) */
  #pageBg.bg-sky i{opacity:.5;
    background:
      radial-gradient(38vw 13vh at 18% 22%,rgba(150,175,215,.16),transparent 70%),
      radial-gradient(30vw 11vh at 72% 12%,rgba(150,175,215,.13),transparent 70%);
    animation:cloudDrift 46s linear infinite}
  #pageBg.bg-sky em{opacity:.4;
    background:
      radial-gradient(44vw 15vh at 60% 70%,rgba(120,150,200,.12),transparent 70%),
      radial-gradient(26vw 9vh at 30% 85%,rgba(120,150,200,.10),transparent 70%);
    animation:cloudDrift 70s linear infinite reverse}
  @keyframes cloudDrift{from{transform:translateX(-6vw)}to{transform:translateX(6vw)}}

  /* WAVES — layered swells rolling along the bottom (LIS chart) */
  #pageBg.bg-waves i{top:auto;bottom:-4vh;height:22vh;left:-18vw;opacity:.4;
    background:radial-gradient(9vw 5vh at 50% 100%,transparent 64%,rgba(38,190,224,.4) 66% 72%,transparent 74%);
    background-size:18vw 22vh;animation:waveRoll 7s linear infinite}
  #pageBg.bg-waves em{top:auto;bottom:-5.5vh;height:22vh;left:-23vw;opacity:.26;
    background:radial-gradient(11vw 6vh at 50% 100%,transparent 64%,rgba(60,140,220,.4) 66% 72%,transparent 74%);
    background-size:23vw 22vh;animation:waveRoll2 11s linear infinite}
  /* translate one pattern period per loop — compositor-only, no repaints */
  @keyframes waveRoll{to{transform:translateX(18vw)}}
  @keyframes waveRoll2{to{transform:translateX(23vw)}}

  /* SPACE — moving galaxy: rotating spiral disc + visibly drifting starfield
     (moon + NASA pages). All transform animation, GPU-composited. */
  #pageBg.bg-space i{inset:-30%;opacity:.75;
    background-image:
      radial-gradient(circle,rgba(215,228,255,.9) 0 1px,transparent 1.6px),
      radial-gradient(circle,rgba(160,190,255,.55) 0 1px,transparent 1.4px);
    background-size:6vw 8vh,3.5vw 5vh;background-position:0 0,2vw 3vh;
    animation:spaceDrift 34s linear infinite alternate}
  #pageBg.bg-space em{inset:-30%;opacity:.6;
    background:
      radial-gradient(28vw 18vh at 24% 66%,rgba(30,95,170,.18),transparent 70%),
      radial-gradient(circle,rgba(255,240,200,.8) 0 1px,transparent 1.5px);
    background-size:100% 100%,11vw 13vh;
    animation:spaceDrift2 52s linear infinite alternate}
  @keyframes spaceDrift{from{transform:translate(0,0)}to{transform:translate(-9vw,4.5vh)}}
  @keyframes spaceDrift2{from{transform:translate(0,0)}to{transform:translate(7vw,-4vh)}}
  /* the Milky Way: a dense diagonal star band with nebula glow and a dark
     dust lane, drifting along its own axis — reads instantly as the galaxy */
  #pageBg.bg-space::before{content:"";position:absolute;left:-30%;top:-12%;
    width:160%;height:124%;
    background:
      radial-gradient(60vw 10vh at 30% 46%,rgba(215,190,255,.20),transparent 70%),
      radial-gradient(52vw 8vh at 66% 52%,rgba(140,195,255,.18),transparent 70%),
      radial-gradient(circle,rgba(238,242,255,.95) 0 1px,transparent 1.5px),
      radial-gradient(circle,rgba(255,232,190,.85) 0 1px,transparent 1.4px),
      radial-gradient(circle,rgba(205,222,255,.75) 0 .8px,transparent 1.2px);
    background-size:100% 100%,100% 100%,2.1vw 3.1vh,3.3vw 4.4vh,1.4vw 2.2vh;
    background-position:0 0,0 0,0 0,1vw 1vh,.4vw 2vh;
    -webkit-mask:linear-gradient(180deg,transparent,rgba(0,0,0,.95) 34% 66%,transparent);
    mask:linear-gradient(180deg,transparent,rgba(0,0,0,.95) 34% 66%,transparent);
    animation:mwDrift 60s linear infinite alternate}
  #pageBg.bg-space::after{content:"";position:absolute;left:-30%;top:-12%;
    width:160%;height:124%;
    background:radial-gradient(74vw 4.5vh at 48% 50%,rgba(4,7,13,.85),transparent 75%);
    animation:mwDrift 60s linear infinite alternate}
  @keyframes mwDrift{from{transform:rotate(-24deg) translateX(-4%)}
                     to{transform:rotate(-24deg) translateX(4%)}}

  /* FIELD — stadium turf rushing under the sports page: mowing stripes,
     yard lines, floodlight glow at the horizon */
  #pageBg.bg-field{perspective:600px}
  #pageBg.bg-field i{top:46%;height:220%;transform-origin:top center;opacity:.42;
    background:
      repeating-linear-gradient(0deg,rgba(235,248,255,.5) 0 3px,transparent 3px 12vh),
      repeating-linear-gradient(90deg,rgba(46,120,64,.5) 0 9vw,rgba(32,92,48,.5) 9vw 18vw);
    animation:fieldRush 6s linear infinite}
  @keyframes fieldRush{from{transform:rotateX(74deg) translateY(-12vh)}
                       to{transform:rotateX(74deg) translateY(0)}}
  #pageBg.bg-field em{top:36%;height:24%;
    background:radial-gradient(ellipse 75% 100% at 50% 60%,rgba(190,230,255,.22),transparent 70%)}

  /* STARS — denser twinkle field (news/default) */
  #pageBg.bg-stars i{opacity:.5;
    background-image:radial-gradient(circle,rgba(190,210,255,.8) 0 1px,transparent 1.7px);
    background-size:5.5vw 7vh;animation:twinkle 4s ease-in-out infinite alternate}
  #pageBg.bg-stars em{opacity:.3;
    background-image:radial-gradient(circle,rgba(255,220,160,.7) 0 1px,transparent 1.7px);
    background-size:9vw 12vh;background-position:3vw 4vh;
    animation:twinkle 5.5s ease-in-out infinite alternate-reverse}
  @keyframes twinkle{from{opacity:.14}to{opacity:.5}}

  /* 3D hand-off: outgoing page falls away behind the incoming one */
  .spotGhost{position:absolute;z-index:0;pointer-events:none;overflow:hidden;
    font-weight:700;font-size:7.2vh;line-height:1.14;max-width:92vw;
    letter-spacing:-.01em;transform-style:preserve-3d;
    animation:pageOut .85s cubic-bezier(.55,0,.85,.36) both}
  @keyframes pageOut{to{opacity:0;transform:translateY(-6vh) translateZ(-420px) rotateX(-15deg)}}

  /* extruded 3D type on the hero numerals */
  .score-row .num,.fw-big .n,.cm .v,.wc .time,.tr .m,.mh-year{
    text-shadow:0 2px 0 rgba(10,14,22,.9),0 4px 0 rgba(8,11,18,.75),
                0 6px 0 rgba(6,9,15,.55),0 9px 18px rgba(0,0,0,.65)}

  /* light sweep gliding across cards */
  .mk-panel,.mk-tile,.mini,.wh-tile{position:relative;overflow:hidden}
  .mk-panel::after,.mk-tile::after,.mini::after,.wh-tile::after{content:"";
    position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(115deg,transparent 42%,rgba(255,255,255,.09) 50%,transparent 58%);
    transform:translateX(-160%);animation:sheen 6.5s ease-in-out infinite}
  .mk-tile::after{animation-delay:1.1s}.mini::after{animation-delay:2.2s}
  .wh-tile::after{animation-delay:3s}
  @keyframes sheen{0%,55%{transform:translateX(-160%)}75%,100%{transform:translateX(160%)}}

  /* ══════ INTRO SEQUENCES — target-acquisition style (Anduril/Palantir):
     a wireframe contact crosses the frame tracked by a reticle with typed
     telemetry. Slow, deliberate motion; ~4.6s before the data page holds. */
  .intro{position:absolute;inset:-4vh -5vw;z-index:5;pointer-events:none;
    color:#4fd7e8;animation:introHide .5s 4.5s both}
  @keyframes introHide{to{opacity:0;visibility:hidden}}
  .intro>span{position:absolute;display:block}
  .intro .wire{width:100%;height:auto;display:block;
    filter:drop-shadow(0 0 7px rgba(79,215,232,.45))}
  .intro .ret{position:absolute;left:-4%;top:-18%;width:108%;height:136%;
    color:var(--amber);opacity:.9;animation:retPulse 1.1s ease-in-out infinite alternate}
  @keyframes retPulse{from{opacity:.55}to{opacity:1}}
  .intro .tlm{position:absolute;left:2%;top:104%;font-family:var(--mono);
    font-size:2vh;letter-spacing:.14em;color:var(--amber);white-space:nowrap;
    overflow:hidden;width:0;border-right:2px solid var(--amber);
    animation:type 1.3s steps(26,end) .9s forwards}
  @keyframes type{to{width:102%}}
  /* dashed track line drawn behind the contact */
  .intro::before{content:"";position:absolute;left:0;right:0;height:0;
    border-top:2px dashed rgba(79,215,232,.28);top:var(--trkline,50%);
    transform:scaleX(0);transform-origin:var(--trkorigin,left);
    animation:trkLine 4s linear both}
  @keyframes trkLine{to{transform:scaleX(1)}}
  /* contact flight paths — slower, no cartoon banking */
  .ip{top:15vh;left:0;width:48vw;--trkline:32vh;
    animation:flyBy 4.3s cubic-bezier(.35,.05,.65,.95) both}
  @keyframes flyBy{from{transform:translateX(-56vw) translateY(4vh) scale(.9)}
                   to{transform:translateX(112vw) translateY(-3vh) scale(1)}}
  .itr{bottom:10vh;left:0;width:74vw;
    animation:rollBy 4.3s cubic-bezier(.3,.1,.7,.9) both}
  @keyframes rollBy{from{transform:translateX(108vw)}to{transform:translateX(-86vw)}}
  .intro-train{--trkline:78%;--trkorigin:right}
  .ijp{bottom:8vh;left:0;width:32vw;--trkline:82%;
    animation:jeepBy 4.3s cubic-bezier(.4,.1,.6,.9) both}
  @keyframes jeepBy{from{transform:translateX(-36vw)}50%{transform:translateX(36vw)}
                    to{transform:translateX(110vw)}}
  .itor{top:6vh;left:0;width:20vw;--trkline:24vh;
    animation:torBy 4.4s cubic-bezier(.4,.1,.6,.9) both}
  @keyframes torBy{from{transform:translateX(-24vw) rotate(-2deg)}
                   to{transform:translateX(116vw) rotate(2deg)}}
  .intro-storm::before{content:"";position:absolute;top:-2vh;left:-8vw;right:-8vw;height:15vh;
    background:radial-gradient(40vw 12vh at 30% 40%,rgba(40,50,70,.85),transparent 70%),
               radial-gradient(46vw 13vh at 70% 30%,rgba(30,38,56,.85),transparent 70%);
    animation:bandDrift 4.5s linear both}
  @keyframes bandDrift{from{transform:translateX(-4vw)}to{transform:translateX(4vw)}}
  .intro-storm::after{content:"";position:absolute;inset:-25% -12%;
    background:repeating-linear-gradient(115deg,transparent 0 13px,rgba(120,160,220,.15) 13px 15px);
    animation:rainDrift 1.1s linear infinite}
  @keyframes rainDrift{to{transform:translate(-5vw,5vh)}}
  .tw{animation:twSway 1.5s ease-in-out infinite alternate}
  @keyframes twSway{from{transform:translateX(-7px)}to{transform:translateX(7px)}}
  /* candlesticks sprout on the markets page then clear (shorter sequence) */
  .intro-candles{animation:introHide .45s 2.4s both}
  .icd{bottom:5vh;left:10vw;width:58vw}
  .cd{transform-box:fill-box;transform-origin:50% 100%;
      animation:cdGrow .55s cubic-bezier(.2,1.4,.4,1) both}
  @keyframes cdGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
  /* spinning wheels on any vehicle */
  .wh{animation:wheelSpin .85s linear infinite}
  @keyframes wheelSpin{to{transform:rotate(360deg)}}

  /* content choreography behind the intros — data holds until the
     acquisition sequence completes (~4.5s) */
  .intro-stage .radar{animation:radarDrop .8s 4s cubic-bezier(.25,1.2,.4,1) both}
  @keyframes radarDrop{from{opacity:0;transform:rotateX(10deg) translateY(-75vh)}
                       to{opacity:1;transform:rotateX(10deg)}}
  .intro-stage .fl-info{animation:riseIn .5s 4.7s both}
  .radar .plane{animation:blipPop .5s cubic-bezier(.2,1.7,.4,1) both;
                animation-delay:calc(4.5s + var(--bi,0)*.15s)}
  @keyframes blipPop{from{opacity:0;transform:translate(-50%,-50%) rotate(var(--hdg)) scale(0)}
                     to{opacity:1;transform:translate(-50%,-50%) rotate(var(--hdg)) scale(1)}}
  .introed .tr{animation-delay:calc(4.4s + var(--i,0)*.12s)}
  .introed .tr-track .tr-anim{animation-delay:4.7s}
  .cm{animation:riseIn .55s 4.3s both}
  .cm:nth-child(2){animation-delay:4.5s}
  .cm-road{animation:riseIn .5s 4.7s both}
  .cm-road .cm-anim{animation-delay:4.8s}
  .wt-stage{position:relative}
  .wt-stage .wt{animation-delay:calc(4.4s + var(--i,0)*.08s),calc(var(--i,0)*-1.9s)}
  .wt-stage .radar-img{animation:riseIn .6s 4.6s both}

  /* svg art sizing (replaces the old emoji glyphs) */
  .tr-anim,.cm-anim{color:#4fd7e8}
  .tr-anim svg,.cm-anim svg{filter:drop-shadow(0 0 5px rgba(79,215,232,.4))}
  .tr-anim svg{height:9vh;width:auto;display:block}
  .cm-anim svg{height:7.5vh;width:auto;display:block}
  .radar .plane{width:3.4vh;height:3.6vh;font-size:0}
  .radar .plane svg{width:100%;height:100%;fill:currentColor;
    filter:drop-shadow(0 0 6px rgba(159,197,232,.7))}
  .radar .plane.near{width:4.4vh;height:4.6vh}
  .radar .plane.near svg{filter:drop-shadow(0 0 9px rgba(255,180,0,.8))}
  .wt .e svg{height:5vh;width:auto}
  .wk .e svg{height:5.6vh;width:auto}
  #wx1V svg,#wx2V svg{height:3.4vh;width:auto;vertical-align:-.8vh}
  .pg-wm svg{width:26vh;height:26vh;display:block}
  .pg-wm{color:#e8ecf2}
  .mn-big svg{width:32vh;height:32vh;display:block;
    filter:drop-shadow(0 0 26px rgba(232,226,207,.3))}
  .mn-strip{display:flex;align-items:center;gap:.7vw}
  .mn-strip svg{width:4.4vh;height:4.4vh;opacity:.5}
  .mn-strip .cur svg{width:6.2vh;height:6.2vh;opacity:1;
    filter:drop-shadow(0 0 10px rgba(255,180,0,.7))}
  .wc .dnd{color:var(--amber)} .wc .dnn{color:#7ea0ff}
  .wt .ppd{color:#4fc3ff;font-size:1.5vh;margin-right:.3vw}

  /* ── PAINTING OF THE DAY — gallery layout: canvas left, curator card right ── */
  .art-wrap{display:flex;gap:3.5vw;align-items:center;max-width:92vw}
  .art-img{max-height:56vh;max-width:40vw;border-radius:.8vh;
    border:1px solid var(--edge);box-shadow:0 1.5vh 5vh rgba(0,0,0,.65);
    animation:kenburns 32s ease-in-out infinite alternate}
  .art-info{max-width:46vw}
  .art-info .t{font-size:4.6vh;font-weight:700;line-height:1.15;text-wrap:balance}
  .art-info .a{font-family:var(--mono);font-size:2.3vh;color:var(--amber);
    margin-top:1.2vh;letter-spacing:.06em}
  .art-info .d{font-size:2.9vh;font-weight:500;line-height:1.45;color:var(--ink);
    margin-top:2vh;display:-webkit-box;-webkit-line-clamp:7;
    -webkit-box-orient:vertical;overflow:hidden}
  .art-info .c{font-family:var(--mono);font-size:1.8vh;letter-spacing:.22em;
    color:var(--ink-faint);margin-top:2.2vh}

  /* ── NASA APOD ── */
  .ap-wrap{display:flex;flex-direction:column;gap:1.4vh;max-width:90vw}
  .ap-img{max-width:88vw;max-height:50vh;object-fit:contain;border-radius:1.4vh;
          border:1px solid var(--edge);box-shadow:0 1vh 4vh rgba(0,0,0,.5)}
  .ap-title{font-size:4vh;font-weight:700}
  .ap-credit{font-family:var(--mono);font-size:2vh;color:var(--ink-faint);letter-spacing:.15em}

  /* ── FED WATCH ── */
  .fw-wrap{display:flex;align-items:center;gap:7vw}
  .fw-big .n{font-family:var(--mono);font-weight:800;font-size:17vh;color:var(--amber);
             line-height:1;font-variant-numeric:tabular-nums;
             animation:fedPulse 2.6s ease-in-out infinite}
  @keyframes fedPulse{0%,100%{text-shadow:0 0 16px rgba(255,180,0,.2)}
                      50%{text-shadow:0 0 44px rgba(255,180,0,.6)}}
  .fw-big .l{font-family:var(--mono);font-size:2.6vh;letter-spacing:.25em;color:var(--ink-dim)}
  .fw-big .w{font-family:var(--mono);font-size:2.4vh;color:var(--cyan);margin-top:1vh}
  .fw-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.4vh 4vw}
  .fw-mt{display:flex;gap:1.2vw;align-items:baseline;font-family:var(--mono);font-size:3.4vh}
  .fw-mt.past{opacity:.3}
  .fw-mt.next .d{color:var(--amber)}
  .fw-mt .d{font-weight:800}
  .fw-mt .sep{font-size:1.9vh;color:var(--purple);border:1px solid var(--purple);
              border-radius:.6vh;padding:.1vh .5vw}

  /* ── METRO-NORTH ── */
  .tr-wrap{display:flex;flex-direction:column;gap:1.7vh;font-family:var(--mono)}
  .tr{display:flex;align-items:baseline;gap:2.5vw}
  .tr .m{font-weight:800;font-size:7vh;color:var(--cyan);min-width:15vw;
         font-variant-numeric:tabular-nums}
  .tr .t{font-size:3.6vh;color:var(--ink);font-weight:700}
  .tr .d{font-size:2.6vh;color:var(--ink-faint)}
  /* train rolls along a dashed track at the bottom of the page (emoji face
     left, so it travels right-to-left) */
  .tr-track{position:relative;margin-top:2.6vh;height:9vh;width:86vw;overflow:hidden}
  .tr-track::after{content:"";position:absolute;left:0;right:0;bottom:1.4vh;height:.4vh;
    background:repeating-linear-gradient(90deg,var(--edge) 0 3vw,transparent 3vw 4.4vw)}
  .tr-anim{position:absolute;bottom:1.9vh;left:0;font-size:6.4vh;line-height:1;
    white-space:nowrap;animation:trainRun 13s linear infinite}
  @keyframes trainRun{from{transform:translateX(88vw)}to{transform:translateX(-60vw)}}

  /* ── NIGHT AMBIENT SCENES — explicit stage heights: these scenes are all
     absolute-positioned art, and spotBody has no natural height ── */
  .amb-video{display:block;width:calc(100% + 10vw);height:64vh;margin:-1vh -5vw;
    object-fit:cover;border-radius:1vh}
  .amb-yt{border:0;background:#000}
  .amb-aurora{position:relative;height:60vh;width:calc(100% + 10vw);
    margin:0 -5vw;overflow:hidden}
  .amb-aurora i{position:absolute;width:56%;top:-35%;height:135%;
    filter:blur(2.2vh);opacity:.8;transform:skewX(-14deg)}
  .amb-aurora i:nth-child(1){left:-10%;
    background:linear-gradient(180deg,transparent 4%,rgba(57,231,141,.75) 26%,rgba(38,208,224,.5) 56%,transparent 88%);
    animation:aur 13s ease-in-out infinite alternate}
  .amb-aurora i:nth-child(2){left:24%;
    background:linear-gradient(180deg,transparent 6%,rgba(38,208,224,.68) 30%,rgba(150,95,235,.48) 62%,transparent 90%);
    animation:aur 17s ease-in-out -6s infinite alternate-reverse}
  .amb-aurora i:nth-child(3){left:58%;
    background:linear-gradient(180deg,transparent 4%,rgba(150,95,235,.6) 26%,rgba(57,231,141,.42) 58%,transparent 88%);
    animation:aur 21s ease-in-out -11s infinite alternate}
  @keyframes aur{from{transform:skewX(-17deg) translateX(-6vw);opacity:.55}
                 to{transform:skewX(-7deg) translateX(7vw);opacity:.95}}
  .amb-aurora b{position:absolute;inset:0;
    background-image:radial-gradient(circle,rgba(220,230,255,.9) 0 1px,transparent 1.5px);
    background-size:5vw 7vh;opacity:.6}
  /* dark treeline silhouette grounds the scene */
  .amb-aurora::after{content:"";position:absolute;left:0;right:0;bottom:0;height:9vh;
    background:
      radial-gradient(16vw 8vh at 10% 100%,#05070c 60%,transparent 62%),
      radial-gradient(22vw 10vh at 36% 100%,#05070c 60%,transparent 62%),
      radial-gradient(18vw 7.5vh at 64% 100%,#05070c 60%,transparent 62%),
      radial-gradient(24vw 9vh at 92% 100%,#05070c 60%,transparent 62%)}
  .amb-solar{position:relative;height:60vh;display:block}
  .amb-solar .sun{position:absolute;left:50%;top:50%;width:6vh;height:6vh;
    margin:-3vh;border-radius:50%;
    background:radial-gradient(circle,#fff3c4,#ffb400 55%,#ff7a00);
    box-shadow:0 0 8vh rgba(255,180,0,.75),0 0 20vh rgba(255,140,0,.3);
    animation:sunPulse 4s ease-in-out infinite alternate}
  @keyframes sunPulse{to{box-shadow:0 0 11vh rgba(255,180,0,.9),0 0 26vh rgba(255,140,0,.4)}}
  .amb-solar .ring{position:absolute;left:50%;top:50%;border-radius:50%;
    border:1px solid rgba(120,160,205,.16);transform:translate(-50%,-50%)}
  .amb-solar .orb{position:absolute;left:50%;top:50%;margin:0;border-radius:50%;
    transform:translate(-50%,-50%);animation:orbSpin linear infinite}
  .amb-solar .orb b{position:absolute;left:50%;top:0;border-radius:50%;
    transform:translate(-50%,-50%)}
  @keyframes orbSpin{from{transform:translate(-50%,-50%) rotate(0)}
                     to{transform:translate(-50%,-50%) rotate(360deg)}}

  /* ── WORLD CLOCK — clocks over a live world map with pinging city marks ── */
  .wc-stage{position:relative}
  .wc-map{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);
    width:84vw;opacity:.55;pointer-events:none}
  .wc-map .wcm .ring{transform-box:fill-box;transform-origin:center;
    animation:wcPing 2.6s ease-out infinite;animation-delay:var(--d,0s)}
  @keyframes wcPing{from{transform:scale(1);opacity:.9}to{transform:scale(4.5);opacity:0}}
  .wc-wrap{position:relative;z-index:1;display:flex;gap:4.5vw;align-items:flex-start}
  .wc{display:flex;flex-direction:column;align-items:center;gap:1.2vh}
  .wc .face{position:relative;width:19vh;height:19vh;border-radius:50%;
            background:radial-gradient(circle at 35% 30%,#1c2230,#10141d 70%);
            border:2px solid var(--edge);
            box-shadow:inset 0 .4vh 1.2vh rgba(0,0,0,.55),0 .6vh 2.4vh rgba(0,0,0,.35)}
  .wc .face.day{background:radial-gradient(circle at 35% 30%,#2a3348,#171d2a 70%);
            border-color:#3a4a60}
  .wc .face i{position:absolute;left:50%;bottom:50%;transform-origin:50% 100%;

<body>

</div>

</div>

  <span class="tag">NEWS</span>
  <div class="ticker"><span class="ticker-inner" id="newsInner">loading headlines…</span></div>
</div>

<div id="alert">
  <div id="alertKicker">ALERT</div>
  <div id="alertBody"></div>
  <div id="alertSub"></div>

<script src="secrets.js"></script>
<script>
/* ════════════════════════════════════════════════════════════════════ */
const CFG = {
  // Keys live in secrets.js (untracked) — merged over CFG at load
  owmKey:  "",
  fredKey: "",
  gmapsKey:"",
  office:{lat:41.0262, lon:-73.6255, addr:"100 Mason St Greenwich CT"},
  lake:  {lat:41.4087, lon:-75.3813, addr:"Lake Wallenpaupack PA"},
  home:  {lat:41.0534, lon:-73.5387},   // for the keyless OSRM traffic fallback
  homeAddr:"Stamford CT",
  todewToken:"",   // ToDew sync — matches Worker HEALTH_TOKEN + app Settings
  // Night ambient video (volcano loop). Local file preferred when present;
  // otherwise streams the YouTube embed below.
  nightVideo:"night_volcano.mp4",
  nightVideoYT:"bLDn39swGIU",   // 4K Polynesian volcano loop (YouTube)
  ambientEveryCycles:2,      // full rotations between night ambient breaks
  ambientNightStart:20, ambientNightEnd:6,   // scenes run 8pm-6am
  // Flight box recentered on 100 Mason (office is the radar bullseye)
  flightBox:{lamin:40.58, lomin:-74.33, lamax:41.47, lomax:-72.92},
  whoopRelay:"",
  pnbkLogo:"https://t3.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=http://patriotbank.com&size=128",
  pnbkLogoAlt:"https://icons.duckduckgo.com/ip3/patriotbank.com.ico",
  favorites:["BOS","NYM","NYY","NYG","NYJ","NE","BRK","NYK","NYR","NJD","PHI","USA"],
  proxy:"http://localhost:8787",
  spotSeconds:12,
  breakingShowSeconds:75,
  nwsShowSeconds:90,
};
Object.assign(CFG, window.SECRETS||{});   // real keys ride in from secrets.js
let PROXY_OK=false;

const $=id=>document.getElementById(id);
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
async function jget(u){const r=await fetch(u);if(!r.ok)throw new Error(r.status);return r.json();}
async function tget(u){const r=await fetch(u);if(!r.ok)throw new Error(r.status);return r.text();}
const viaProxy=u=>CFG.proxy+"/p?u="+encodeURIComponent(u);

const S={ spx:null,btc:null,pnbk:null,fng:null, rates:{}, sparks:{}, sparkKind:{},
          games:[], natNews:[], locNews:[], bankNews:[], sportsNews:[], traffic:null,
          tides:null, lakeTemp:null, flights:[], forecast:[], hourly:[],
          buoy:null, whoop:null, tasks:[], alerts:[], apod:null, art:null };

/* ── clock + wordmark ── */
function tick(){
  const d=new Date();
  let h=d.getHours()%12;if(!h)h=12;
  $("clock").textContent=h+":"+String(d.getMinutes()).padStart(2,"0");
  const days=["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
  const mos=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  $("dateline").textContent=days[d.getDay()]+" · "+mos[d.getMonth()]+" "+d.getDate();
}
tick();setInterval(tick,5000);
document.addEventListener("mousemove",()=>document.body.classList.add("mouse"),{once:true});

const F={D:["11110","10001","10001","10001","10001","10001","11110"],
E:["11111","10000","10000","11110","10000","10000","11111"],
W:["10001","10001","10001","10101","10101","10101","01010"],
S:["01111","10000","10000","01110","00001","00001","11110"],
F:["11111","10000","10000","11110","10000","10000","10000"],
" ":["00000","00000","00000","00000","00000","00000","00000"]};
(function(){
  const cv=$("wordmark"),ctx=cv.getContext("2d");
  const word="DEWS FEED",dot=3,gap=1,adv=6*(dot+gap);
  cv.width=word.length*adv;cv.height=7*(dot+gap);
  [...word].forEach((ch,ci)=>{const g=F[ch]||F[" "];
    for(let r=0;r<7;r++)for(let c=0;c<5;c++){
      const on=g[r][c]==="1";
      ctx.fillStyle=on?"#ffb400":"rgba(255,180,0,.07)";
      if(on){ctx.shadowColor="rgba(255,180,0,.8)";ctx.shadowBlur=4}else ctx.shadowBlur=0;
      ctx.beginPath();ctx.arc(ci*adv+c*(dot+gap)+dot/2,r*(dot+gap)+dot/2,dot/2,0,7);ctx.fill();
    }});
})();

/* ══════════════ ALERT ENGINE ══════════════ */
const seenAlerts=new Set(JSON.parse(localStorage.getItem("dfSeen")||"[]"));
function rememberSeen(k){seenAlerts.add(k);
  localStorage.setItem("dfSeen",JSON.stringify([...seenAlerts].slice(-200)));}
let alertTimer=null, activeWarning=null;

/* Alert chime — synthesized with WebAudio, no sound files needed. Plays out
   the Pi's HDMI audio (monitor speakers) or 3.5mm jack. Kiosk launches with
   autoplay allowed, so no user gesture is required on the Pi. */
function chime(kind){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==="suspended")ctx.resume();
    const t0=ctx.currentTime;
    const tone=(f,st,d,g,type)=>{
      const o=ctx.createOscillator(),v=ctx.createGain();
      o.type=type||"sine";o.frequency.value=f;
      v.gain.setValueAtTime(0.0001,t0+st);
      v.gain.linearRampToValueAtTime(g||0.22,t0+st+0.02);
      v.gain.exponentialRampToValueAtTime(0.0001,t0+st+d);
      o.connect(v);v.connect(ctx.destination);
      o.start(t0+st);o.stop(t0+st+d+0.05);
    };
    if(kind==="breaking"){
      // Newsroom sting: three ascending notes
      tone(659,0.00,0.22);
      tone(880,0.24,0.22);
      tone(1109,0.48,0.65);
    }else{
      // Weather warning: softened EAS-style dual tone, twice
      tone(853,0.0,0.7,0.14,"square");tone(960,0.0,0.7,0.14,"square");
      tone(853,0.9,0.7,0.14,"square");tone(960,0.9,0.7,0.14,"square");
    }
    setTimeout(()=>ctx.close(),4000);
  }catch(e){}
}

function takeover(kind,kicker,body,sub,seconds){
  chime(kind==="breaking"?"breaking":"nws");
  const el=$("alert");
  el.className="show "+kind;
  $("alertKicker").textContent=kicker;
  $("alertBody").textContent=body;
  $("alertSub").textContent=sub||"";
  clearTimeout(alertTimer);
  alertTimer=setTimeout(()=>{el.className="";updateStrip();},seconds*1000);
}
function updateStrip(){
  if(activeWarning){
    $("alertStripTxt").textContent=activeWarning;
    $("alertStrip").className="show";
  } else $("alertStrip").className="";
}
async function fetchAlerts(){
  let all=[];
  for(const loc of [CFG.office,CFG.lake]){
    try{
      const j=await jget(`https://api.weather.gov/alerts/active?point=${loc.lat},${loc.lon}`);
      all=all.concat(j.features||[]);
    }catch(e){}
  }
  const ids=new Set(); all=all.filter(f=>!ids.has(f.id)&&ids.add(f.id));
  S.alerts=all;
  activeWarning=null;
  for(const f of all){
    const p=f.properties||{};
    const sev=(p.severity||"").toLowerCase();
    const isWarning=/warning/i.test(p.event||"")||sev==="extreme"||sev==="severe";
    if(isWarning){
      activeWarning=(p.event||"Weather Warning").toUpperCase()+" — until "+
        (p.ends?new Date(p.ends).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}):"further notice");
      if(!seenAlerts.has(f.id)){
        rememberSeen(f.id);
        takeover("nws",(p.event||"WEATHER WARNING").toUpperCase(),
          p.headline||p.event||"Severe weather warning in effect",
          (p.areaDesc||"")+" · NATIONAL WEATHER SERVICE",
          CFG.nwsShowSeconds);
      }
      break;
    }
  }
  if(!activeWarning){
    const watch=all.find(f=>/watch|advisory/i.test(f.properties?.event||""));
    if(watch){
      const p=watch.properties;
      activeWarning=(p.event||"").toUpperCase()+
        (p.ends?" — until "+new Date(p.ends).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}):"");
    }
  }
  if(!$("alert").classList.contains("show")) updateStrip();
}
const BREAKING_RE=/\b(breaking|urgent|just in|live updates?)\b[:\s]|^BREAKING/i;
function checkBreaking(){
  for(const h of S.natNews){
    if(BREAKING_RE.test(h.t)){
      const key="bn:"+h.t.slice(0,80);
      if(!seenAlerts.has(key)){
        rememberSeen(key);
        takeover("breaking","● BREAKING NEWS",
          h.t.replace(BREAKING_RE,"").trim(),(h.src||"").toUpperCase(),
          CFG.breakingShowSeconds);
        return;
      }
    }
  }
}

/* ══════════════ helpers ══════════════ */
function hav(lat1,lon1,lat2,lon2){
  const R=3959,rad=x=>x*Math.PI/180;
  const dLa=rad(lat2-lat1),dLo=rad(lon2-lon1);
  const a=Math.sin(dLa/2)**2+Math.cos(rad(lat1))*Math.cos(rad(lat2))*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function sparkSVG(pts,w,h,color){
  if(!pts||pts.length<2)return "";
  const mn=Math.min(...pts),mx=Math.max(...pts),rg=(mx-mn)||1;
  const step=w/(pts.length-1);
  const P=pts.map((v,i)=>`${(i*step).toFixed(1)},${(h-((v-mn)/rg)*(h-4)-2).toFixed(1)}`).join(" ");
  const last=pts.at(-1),first=pts[0];
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${P}" fill="none" stroke="${color}" stroke-width="3"
      stroke-linejoin="round" stroke-linecap="round"/>
    <polygon points="0,${h} ${P} ${w},${h}" fill="${color}" opacity=".08"/>
  </svg>`;
}
function airlineName(cs){
  const p=(cs||"").slice(0,3).toUpperCase();
  const m={AAL:"American",UAL:"United",DAL:"Delta",JBU:"JetBlue",SWA:"Southwest",
    ASA:"Alaska",FFT:"Frontier",NKS:"Spirit",RPA:"Republic",SKW:"SkyWest",
    EJA:"NetJets",GTI:"Atlas Air",FDX:"FedEx",UPS:"UPS",ACA:"Air Canada",
    BAW:"British Airways",AFR:"Air France",DLH:"Lufthansa",KLM:"KLM",
    VIR:"Virgin Atlantic",UAE:"Emirates",EIN:"Aer Lingus",ENY:"Envoy",PDT:"Piedmont"};
  return m[p]||"Private / GA";
}

/* ══════════════ SVG ART LIBRARY — zero emoji, everything drawn ══════════════ */
function wxSVG(kind,cls){
  cls=cls||"wxi";
  const sun=`<circle cx="32" cy="30" r="12" fill="#ffd23f"/>`+
    [0,45,90,135,180,225,270,315].map(a=>`<line x1="32" y1="12" x2="32" y2="6" stroke="#ffd23f" stroke-width="4" stroke-linecap="round" transform="rotate(${a} 32 30)"/>`).join("");
  const cloud=(f,dy=0)=>`<g transform="translate(0 ${dy})"><circle cx="25" cy="36" r="10" fill="${f}"/><circle cx="37" cy="31" r="12" fill="${f}"/><circle cx="48" cy="37" r="8" fill="${f}"/><rect x="19" y="36" width="35" height="10" rx="5" fill="${f}"/></g>`;
  const drops=n=>Array.from({length:n},(_,i)=>`<line x1="${27+i*9}" y1="51" x2="${24+i*9}" y2="60" stroke="#4fc3ff" stroke-width="3.5" stroke-linecap="round"/>`).join("");
  const flakes=n=>Array.from({length:n},(_,i)=>`<circle cx="${27+i*9}" cy="55" r="2.6" fill="#cfe6ff"/>`).join("");
  const bolt=`<polygon points="35,45 28,58 34,56 30,66 43,50 36,52 41,45" fill="#ffe066"/>`;
  const fog=[48,54,60].map(y=>`<rect x="15" y="${y}" width="34" height="3.4" rx="1.7" fill="#9fb2cc" opacity=".85"/>`).join("");
  let g="";
  if(kind==="sun")g=sun;
  else if(kind==="partsun")g=`<g transform="translate(-4 -8) scale(.78)">${sun}</g>`+cloud("#b9c8de",2);
  else if(kind==="cloud")g=cloud("#aebdd4");
  else if(kind==="fog")g=cloud("#8fa1ba",-6)+fog;
  else if(kind==="rain")g=cloud("#8fa6c8",-5)+drops(3);
  else if(kind==="drizzle")g=cloud("#9db2d0",-5)+drops(2);
  else if(kind==="snow")g=cloud("#b7c6dc",-5)+flakes(3);
  else if(kind==="storm")g=cloud("#7d90b0",-7)+bolt;
  else g=cloud("#aebdd4");
  return `<svg class="${cls}" viewBox="0 0 64 68">${g}</svg>`;
}
const wmoArt=c=>c===0?"sun":c<=2?"partsun":c===3?"cloud":c<=48?"fog":
               c<=57?"drizzle":c<=67?"rain":c<=77?"snow":c<=82?"rain":c<=86?"snow":"storm";
const wmoEmoji=c=>wxSVG(wmoArt(c));

function moonSVG(frac,cls){
  const r=46, phase=((frac%1)+1)%1, waxing=phase<=0.5;
  const t=Math.cos(phase*2*Math.PI), rx=Math.abs(t)*r;
  const sweepOuter=waxing?1:0, sweepInner=(t>0)?(waxing?0:1):(waxing?1:0);
  const d=`M50 ${50-r} A${r} ${r} 0 0 ${sweepOuter} 50 ${50+r} A${rx.toFixed(1)} ${r} 0 0 ${sweepInner} 50 ${50-r}Z`;
  return `<svg class="${cls||""}" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="${r}" fill="#161d2c"/>
    <path d="${d}" fill="#e8e2cf"/>
    <g fill="rgba(20,24,36,.16)"><circle cx="38" cy="33" r="6"/><circle cx="61" cy="57" r="9"/>
    <circle cx="45" cy="70" r="4"/><circle cx="66" cy="30" r="3.5"/><circle cx="30" cy="52" r="5"/></g>
  </svg>`;
}

/* ══════════════ FLIGHT RADAR ══════════════ */
async function fetchFlights(){
  const b=CFG.flightBox;
  const u=`https://opensky-network.org/api/states/all?lamin=${b.lamin}&lomin=${b.lomin}&lamax=${b.lamax}&lomax=${b.lomax}`;
  let j=null;
  // proxy FIRST — OpenSky doesn't send CORS headers, direct only works headless
  if(PROXY_OK){ try{ j=await jget(viaProxy(u)); }catch(e){} }
  if(!j){ try{ j=await jget(u); }catch(e){} }
  if(!j||!j.states)return;
  S.flights=j.states
    .filter(s=>s[5]!=null&&s[6]!=null&&!s[8])
    .map(s=>({hex:s[0],cs:(s[1]||"").trim()||s[0].toUpperCase(),
      lon:s[5],lat:s[6],
      altFt:s[7]?Math.round(s[7]*3.281):null,
      kt:s[9]?Math.round(s[9]*1.944):null,
      hdg:s[10]||0,
      dist:hav(CFG.office.lat,CFG.office.lon,s[6],s[5])}))
    .sort((a,b2)=>a.dist-b2.dist)
    .slice(0,8);
  S.flightsAt=Date.now();   // freshness stamp — radar hides when stale
  // Photo of an actual overhead airframe (matched by transponder hex) via
  // Planespotters. Small GA planes often have no photo, so walk the three
  // nearest and feature the first one that does (usually an airliner).
  for(let i=0;i<Math.min(3,S.flights.length);i++){
    const p=await getPlanePhoto(S.flights[i].hex);
    if(p){
      S.flights[i].photo=p;
      if(i>0) S.flights.unshift(S.flights.splice(i,1)[0]);
      break;
    }
  }
  buildDataTicker();
}
const planePhotoCache=new Map();
async function getPlanePhoto(hex){
  if(planePhotoCache.has(hex))return planePhotoCache.get(hex);
  let p=null;
  const u=`https://api.planespotters.net/pub/photos/hex/${hex}`;
  try{
    let j=null;
    // Proxy FIRST — planespotters 403s browser UAs from this network; the
    // proxy sends the app-identifying UA their API asks for.
    try{ j=PROXY_OK?await jget(viaProxy(u)):await jget(u); }
    catch(e){ j=await jget(u); }
    const ph=j&&j.photos&&j.photos[0];
    if(ph&&(ph.thumbnail_large||ph.thumbnail))
      p={src:(ph.thumbnail_large||ph.thumbnail).src, by:ph.photographer||""};
  }catch(e){}
  planePhotoCache.set(hex,p);
  if(planePhotoCache.size>40){planePhotoCache.delete(planePhotoCache.keys().next().value);}
  return p;
}
const flightsFresh=()=>S.flights.length&&S.flightsAt&&(Date.now()-S.flightsAt<25*60*1000);
function radarHTML(){
  const b=CFG.flightBox;
  const planes=S.flights.map((f,i)=>{
    const x=((f.lon-b.lomin)/(b.lomax-b.lomin))*100;
    const y=(1-(f.lat-b.lamin)/(b.lamax-b.lamin))*100;
    return `<span class="plane ${i===0?"near":""}" style="left:${x.toFixed(1)}%;top:${y.toFixed(1)}%;--hdg:${Math.round(f.hdg)}deg;--bi:${i}">${VEH.planeTop}</span>`;
  }).join("");
  const hx=((CFG.office.lon-b.lomin)/(b.lomax-b.lomin))*100;
  const hy=(1-(CFG.office.lat-b.lamin)/(b.lamax-b.lamin))*100;
  const n=S.flights[0];
  const info=n?`
    <div class="fl-info">
      <div class="cs">${esc(n.cs)}</div>
      <div class="al">${airlineName(n.cs)}</div>
      <div class="st">
        ALT <b>${n.altFt?n.altFt.toLocaleString()+" FT":"—"}</b> ·
        SPD <b>${n.kt?n.kt+" KT":"—"}</b><br>
        DIST <b>${n.dist.toFixed(0)} MI</b> FROM 100 MASON · ${S.flights.length} OVERHEAD
      </div>
      ${n.photo?`<img class="fl-photo" src="${n.photo.src}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='none'">
        <div class="fl-credit">PHOTO: ${esc(n.photo.by).toUpperCase()} · PLANESPOTTERS.NET</div>`:""}
    </div>`:"";
  return `<div class="fl-wrap intro-stage">
    <div class="intro intro-flights"><span class="ip">${VEH.planeSide}${VEH.reticle}
      <b class="tlm">${n?`CONTACT ${esc(n.cs)} · ${n.altFt?n.altFt.toLocaleString()+" FT":"ALT —"} · TRACKING`:"SCANNING SECTOR · NO CONTACTS"}</b></span></div>
    <div class="radar">
      <div class="ring"></div><div class="ring r2"></div><div class="ring r3"></div>
      <div class="cross h"></div><div class="cross v"></div>
      <div class="sweep"></div>
      <span class="home" style="left:${hx.toFixed(1)}%;top:${hy.toFixed(1)}%"></span>
      ${planes}
    </div>${info}</div>`;
}

function todaysMktHist(){
  const now=new Date();
  const mos=["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];
  const key=String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
  if(MKT_HIST[key]){
    const e=MKT_HIST[key];
    return {label:mos[now.getMonth()]+" "+now.getDate()+", "+e.y, ...e};
  }
  // No entry for today: the table is sparse, and the old nearest-date search
  // pinned the card to the same fact for days at a time. Rotate through the
  // whole table by day-of-year instead so the card changes every day.
  const keys=Object.keys(MKT_HIST).sort();
  const doy=Math.floor((now-new Date(now.getFullYear(),0,0))/86400000);
  const k=keys[doy%keys.length];
  const e=MKT_HIST[k];
  const [mm,dd]=k.split("-").map(Number);
  return {label:"FROM "+mos[mm-1]+" "+dd+", "+e.y, ...e};
}

/* ══════════════ MOON PHASE (computed locally, same math as the LED panel) ══ */
function moonPhaseFrac(){
  const synodic=29.53058867;
  const refNewMoon=Date.UTC(2000,0,6,18,14)/86400000;   // known new moon
  const days=Date.now()/86400000-refNewMoon;
  return ((days%synodic)+synodic)%synodic/synodic;      // 0=new, .5=full
}
const MOON_NAMES=["New Moon","Waxing Crescent","First Quarter","Waxing Gibbous",
                  "Full Moon","Waning Gibbous","Last Quarter","Waning Crescent"];
function moonPageHTML(){
  const p=moonPhaseFrac();
  const idx=Math.round(p*8)%8;
  const illum=Math.round((1-Math.cos(2*Math.PI*p))/2*100);
  const dFull=(((0.5-p)+1)%1)*29.53, dNew=((1-p)%1)*29.53;
  const strip=MOON_NAMES.map((_,i)=>
    `<span class="${i===idx?"cur":""}">${moonSVG(i/8)}</span>`).join("");
  return `<div class="mn-wrap">
    <div class="mn-big">${moonSVG(p)}</div>
    <div class="mn-info">
      <div class="name">${MOON_NAMES[idx]}</div>
      <div class="illum">${illum}% ILLUMINATED</div>
      <div class="next">FULL MOON IN ${Math.round(dFull)}d<br>NEW MOON IN ${Math.round(dNew)}d</div>
      <div class="mn-strip">${strip}</div>
    </div>
  </div>`;
}

/* ══════════════ WHOOP (via Apps Script relay) ══════════════ */
async function fetchWhoop(){
  const u=CFG.whoopRelay; if(!u)return;
  let j=null;
  try{ j=await jget(u); }
  catch(e){ if(PROXY_OK){ try{ j=await jget(viaProxy(u)); }catch(e2){} } }
  if(!j)return;
  // Relay returns all zeros when its WHOOP tokens are missing/expired
  const sum=(j.recovery_score||0)+(j.strain||0)+(j.sleep_score||0);
  S.whoop=sum>0?j:null;
}

/* ══════════════ VESTABOARD (quote page) ══════════════
   Split-flap simulation: every tile starts blank and advances one character
   per tick through the wheel — in wheel order, like the real hardware — until
   it reaches its target, with a noise-burst clack while any flap is moving. */
const VB_WHEEL=" ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$()-+&=;:'\"%,./?";
function vbSanitize(s){
  return s.toUpperCase()
    .replace(/[—–]/g,"-").replace(/[’‘]/g,"'").replace(/[“”]/g,'"')
    .split("").map(c=>VB_WHEEL.includes(c)?c:" ").join("");
}
function vbLines(text,cols){
  const words=vbSanitize(text).split(/\s+/).filter(Boolean);
  const lines=[];let cur="";
  for(const w of words){
    if((cur?cur.length+1:0)+w.length<=cols) cur=cur?cur+" "+w:w;
    else{ if(cur)lines.push(cur); cur=w.slice(0,cols); }
  }
  if(cur)lines.push(cur);
  return lines;
}
function vestaboardHTML(q){
  // Real Vestaboard geometry: 22 columns. Rows grow with the quote (min 6
  // like the real board, blank rows pad top/bottom so the text sits centered).
  const cols=22;
  const rowsRaw=[...vbLines('"'+q.q+'"',cols),"",...vbLines("- "+q.a,cols)];
  while(rowsRaw.length<5) rowsRaw.length%2?rowsRaw.push(""):rowsRaw.unshift("");
  const rows=rowsRaw.map(l=>{
    const pad=Math.floor((cols-l.length)/2);
    return (" ".repeat(pad)+l).padEnd(cols," ");
  });
  const rowHTML=r=>`<div class="vb-row">${r.split("").map(ch=>
    `<span class="vb-cell" data-t="${ch===" "?"":esc(ch)}"></span>`).join("")}</div>`;
  // Color-chip strip, centered on the bottom row — Patriot Bank red/white/navy
  const chipCols=["#b22234","#f5f6f8","#1e3f7a","#b22234","#f5f6f8","#1e3f7a","#b22234"];
  const s=Math.floor((cols-chipCols.length)/2);
  const chipRow=`<div class="vb-row">${Array.from({length:cols},(_,i)=>
    (i>=s&&i<s+chipCols.length)
      ?`<span class="vb-cell chip" style="--c:${chipCols[i-s]}"></span>`
      :`<span class="vb-cell"></span>`).join("")}</div>`;
  const totalRows=rows.length+1;   // + chip row
  // Tile size: fill the width (88vw budget) unless height (54vh) binds first
  const cs=`min(${(88/(cols*1.13)).toFixed(2)}vw,${(54/(totalRows*1.6)).toFixed(2)}vh)`;
  return `<div class="vb-wrap" data-cols="${cols}" style="--cs:${cs}">${rows.map(rowHTML).join("")}${chipRow}</div>`;
}
let vbTimer=null,vbCtx=null;
function stopVestaboard(){
  if(vbTimer){clearInterval(vbTimer);vbTimer=null;}
  if(vbCtx){try{vbCtx.close();}catch(e){} vbCtx=null;}
}
function animateVestaboard(){
  stopVestaboard();
  const LEN=VB_WHEEL.length;
  const wrap=document.querySelector("#spotBody .vb-wrap");
  const colsN=wrap?parseInt(wrap.dataset.cols)||22:22;
  // Authentic pacing: every flap advances through the wheel at ~7 flips/sec,
  // makes 1-2 full revolutions before its target, and starts as a wave from
  // the top-left — the full board takes ~30-40s to settle like the real one.
  const cells=[...document.querySelectorAll("#spotBody .vb-cell:not(.chip)")]
    .map((el,i)=>{
      const t=VB_WHEEL.indexOf(el.dataset.t||" ");
      const r=Math.floor(i/colsN), c=i%colsN;
      return {el,t,pos:0,
        delay:c*2+r*6,                        // cascade wave (in ticks)
        travel:t+LEN*(1+((r*3+c)%2))};        // 1-2 extra revolutions
    })
    .filter(c=>c.t>0);
  const chips=[...document.querySelectorAll("#spotBody .vb-cell.chip")];
  if(!cells.length)return;
  let noise=null;
  try{
    vbCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(vbCtx.state==="suspended")vbCtx.resume();
    noise=vbCtx.createBuffer(1,Math.floor(vbCtx.sampleRate*0.03),vbCtx.sampleRate);
    const d=noise.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
  }catch(e){vbCtx=null;}
  const click=n=>{
    if(!vbCtx)return;
    try{
      const src=vbCtx.createBufferSource(),g=vbCtx.createGain(),
            f=vbCtx.createBiquadFilter();
      src.buffer=noise;f.type="bandpass";
      f.frequency.value=2200+Math.random()*1200;f.Q.value=1.2;
      g.gain.value=Math.min(0.28,0.05+n*0.004);   // louder while more flaps move
      src.connect(f);f.connect(g);g.connect(vbCtx.destination);src.start();
    }catch(e){}
  };
  let tickN=0;
  vbTimer=setInterval(()=>{
    tickN++;
    let active=0, waiting=0;
    for(const c of cells){
      if(c.pos>=c.travel) continue;          // settled on its letter
      if(tickN<=c.delay){ waiting++; continue; }
      c.pos++;
      const ch=VB_WHEEL[c.pos%LEN];
      c.el.textContent=(ch===" ")?"":ch;
      active++;
    }
    if(active)click(active);
    else if(!waiting){
      chips.forEach((el,i)=>setTimeout(()=>el.classList.add("on"),i*90));
      if(chips.length)click(8);
      stopVestaboard();
    }
  },140);
}

/* ══════════════ FED WATCH ══════════════
   2026 FOMC decision days (day 2 of each meeting, statement at 2:00 PM ET).
   Verified against federalreserve.gov July 2026. SEP = quarterly projections. */
const FOMC_2026=[[1,28],[3,18],[4,29],[6,17],[7,29],[9,16],[10,28],[12,9]];
function fedWatchHTML(){
  const now=new Date();
  const mos=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  let next=null;
  const rows=FOMC_2026.map(([m,d])=>{
    const dt=new Date(2026,m-1,d,14,0,0);
    const past=dt<now;
    const isNext=!past&&!next;
    if(isNext)next=dt;
    return `<div class="fw-mt ${past?"past":""} ${isNext?"next":""}">
      <span class="d">${mos[m-1]} ${d}</span>
      ${[3,6,9,12].includes(m)?'<span class="sep">SEP</span>':""}</div>`;
  }).join("");
  const days=next?Math.max(0,Math.ceil((next-now)/86400000)):null;
  return `<div class="fw-wrap">
    <div class="fw-big">
      <div class="n">${days==null?"—":days}</div>
      <div class="l">DAYS TO FOMC</div>
      ${next?`<div class="w">${mos[next.getMonth()]} ${next.getDate()} · 2:00 PM ET</div>`:""}
    </div>
    <div class="fw-grid">${rows}</div>
  </div>`;
}

/* ══════════════ METRO-NORTH (Greenwich → GCT, scheduled) ══════════════
   Same static New Haven Line schedule the LED panel uses (realtime MTA
   departures are protobuf-only), shifted +10 min Stamford→Greenwich. */
const MNR_WD=[430,530,600,615,630,645,700,709,716,724,731,739,746,754,
  801,809,816,824,831,839,846,854,901,916,931,946,1001,1031,1101,1131,
  1201,1231,1301,1331,1401,1431,1501,1531,1555,1613,1630,1700,1730,1800,
  1830,1900,1930,2000,2030,2100,2130,2200,2230,2300,2330,30,100];
const MNR_WE=[500,600,700,800,900,1000,1100,1200,1300,1400,1500,1600,
  1700,1800,1900,2000,2100,2200,2300,30];
function trainsHTML(){
  const now=new Date();
  const sched=(now.getDay()===0||now.getDay()===6)?MNR_WE:MNR_WD;
  const curMin=now.getHours()*60+now.getMinutes();
  const deps=sched.map(t=>{
    const hm=(Math.floor(t/100)*60+t%100+10)%1440;
    let diff=hm-curMin;
    if(diff<0)diff+=1440;
    return {diff,hm};
  }).sort((a,b)=>a.diff-b.diff).slice(0,4);
  const fmt=hm=>{let h=Math.floor(hm/60),m=hm%60,ap=h>=12?"PM":"AM";
    h=h%12||12;return h+":"+String(m).padStart(2,"0")+" "+ap;};
  return `<div class="tr-wrap introed">
    <div class="intro intro-train"><span class="itr">${VEH.train}${VEH.reticle}
      <b class="tlm">SVC NH LINE · DEP ${fmt(deps[0].hm)} · T-${deps[0].diff} MIN</b></span></div>
    ${deps.map(d=>`
    <div class="tr"><span class="m">${d.diff>=60?Math.floor(d.diff/60)+"h "+d.diff%60+"m":d.diff+"m"}</span>
    <span class="t">${fmt(d.hm)}</span><span class="d">GREENWICH → GRAND CENTRAL</span></div>`).join("")}
    <div class="tr-track"><span class="tr-anim">${VEH.train}</span></div>
  </div>`;
}

/* ══════════════ PAINTING OF THE DAY ══════════════
   Art Institute of Chicago open API — public-domain masterpieces with real
   curatorial summaries. Curated ID rotation (all verified to have image +
   short_description), one per day, cached like APOD. */
const ART_IDS=[27992,6565,111628,28067,16568,20684,28560,80607,14598,64818,109780];
async function fetchArt(){
  try{
    const today=new Date().toLocaleDateString("en-CA",{timeZone:"America/New_York"});
    const cached=JSON.parse(localStorage.getItem("artday")||"null");
    if(cached&&cached.date===today){S.art=cached;return;}
    const doy=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,0))/86400000);
    const id=ART_IDS[doy%ART_IDS.length];
    const u=`https://api.artic.edu/api/v1/artworks/${id}?fields=id,title,artist_display,date_display,short_description,image_id`;
    let j=null;
    try{ j=await jget(u); }catch(e){ if(PROXY_OK) j=await jget(viaProxy(u)); }
    const d=j&&j.data;
    if(d&&d.image_id){
      S.art={date:today,title:d.title||"",artist:d.artist_display||"",
        when:d.date_display||"",
        desc:String(d.short_description||"").replace(/<[^>]*>/g,"").replace(/\s+/g," ").trim(),
        img:`https://www.artic.edu/iiif/2/${d.image_id}/full/843,/0/default.jpg`};
      localStorage.setItem("artday",JSON.stringify(S.art));
    }
  }catch(e){}
}

/* ══════════════ NASA APOD (daily, cached in localStorage) ══════════════ */
async function fetchApod(){
  try{
    const today=new Date().toLocaleDateString("en-CA",{timeZone:"America/New_York"});
    const cached=JSON.parse(localStorage.getItem("apod")||"null");
    if(cached&&cached.date===today){S.apod=cached;return;}
    const u="https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY&thumbs=true";
    const j=await jget(PROXY_OK?viaProxy(u):u);
    if(j&&(j.media_type==="image"||j.thumbnail_url)){
      S.apod={date:j.date||today,title:j.title||"",
        src:j.media_type==="image"?(j.url||j.hdurl):j.thumbnail_url,
        by:(j.copyright||"NASA").replace(/\n/g," ").trim()};
      localStorage.setItem("apod",JSON.stringify(S.apod));
    }
  }catch(e){}
}

      <circle class="ring" cx="${x}" cy="${y}" r="4" fill="none" stroke-width="1.5"

    el.querySelector(".time").textContent=`${h}:${p.minute} ${p.dayPeriod}`;
    const isDay=h24>=6&&h24<18;
    el.querySelector(".sub").innerHTML=
      `${p.weekday.toUpperCase()} · <b class="${isDay?"dnd":"dnn"}">●</b> ${isDay?"DAY":"NIGHT"}`;
    el.querySelector(".face").classList.toggle("day",h24>=6&&h24<18);
    el.querySelector("i.h").style.transform=`rotate(${(h%12)*30+m*.5}deg)`;
    el.querySelector("i.m").style.transform=`rotate(${m*6+s*.1}deg)`;
    el.querySelector("i.s").style.transform=`rotate(${s*6}deg)`;
  });
}
function startWorldClock(){ stopWorldClock(); tickWorldClock(); wcTimer=setInterval(tickWorldClock,1000); }

/* ══════════════ NIGHT AMBIENT BREAKS ══════════════

   breather on a moving scene: the volcano loop (if the video file is
   present), CSS aurora curtains, or the spinning solar system. */

}
function volcanoHTML(){

  // video errors and swaps itself for the YouTube embed in place.
  if(CFG.nightVideo&&!S.volcanoDead)
    return `<video class="amb-video" src="${CFG.nightVideo}" autoplay muted loop
      playsinline onerror="S.volcanoDead=1;this.outerHTML=volcanoYT()"></video>`;

}
function auroraHTML(){
  return `<div class="amb-aurora"><i></i><i></i><i></i><b></b></div>`;
}
const AMB_PLANETS=[  // name, orbit radius vh, size vh, color, period s
  ["MERCURY",6.5,.9,"#b9a698",7],["VENUS",9.5,1.4,"#e6c78d",11],
  ["EARTH",12.8,1.5,"#5aa0e0",16],["MARS",16,1.2,"#d97b53",24],

function solarHTML(){
  return `<div class="amb-solar"><span class="sun"></span>${AMB_PLANETS.map(([n,r,s,c,p])=>`
    <span class="orb" style="width:${r*2}vh;height:${r*2}vh;animation-duration:${p}s;animation-delay:-${(p*((r*7)%10)/10).toFixed(1)}s">

const AMBIENT=[
  {k:"VOLCANO NIGHTS",  b:volcanoHTML, ok:()=>(CFG.nightVideo&&!S.volcanoDead)||CFG.nightVideoYT, dur:300000},
  {k:"AURORA BOREALIS", b:auroraHTML,  ok:()=>true, dur:150000},
  {k:"SOLAR SYSTEM",    b:solarHTML,   ok:()=>true, dur:150000},
];

function isAmbientHours(){
  const h=new Date().getHours();
  return h>=CFG.ambientNightStart||h<CFG.ambientNightEnd;
}
function showAmbient(){
  // pick the next available scene
  for(let t=0;t<AMBIENT.length;t++){
    const a=AMBIENT[ambIdx%AMBIENT.length]; ambIdx++;
    if(!a.ok()) continue;
    stopVestaboard(); stopWorldClock();

    $("spotKicker").style.setProperty("--acc","var(--teal)");
    document.querySelector("#spotKicker .bar").style.background="var(--teal)";

let spotIdx=0;
// Kicker text decodes in: random glyphs resolve left-to-right (~0.5s)
let decTimer=null;
function decodeKicker(txt){
  clearInterval(decTimer);
  const el=$("spotKickerTxt"), CH="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#/\\<>_";
  let n=0;
  const steps=10;
  decTimer=setInterval(()=>{
    n++;
    el.textContent=txt.split("").map((c,i)=>
      (c===" "||i<txt.length*n/steps)?c:CH[(Math.random()*CH.length)|0]).join("");
    if(n>=steps){ el.textContent=txt; clearInterval(decTimer); }
  },45);
}
// Backdrop theme per page — matched on the kicker text
function bgFor(k){
  if(/MOON|NASA/.test(k)) return "bg-space";
  if(/MARKET|FED|BANKING/.test(k)) return "bg-grid";
  if(/^(MLB|NBA|NHL|NFL|NCAAB|WC|EPL)\b/.test(k)) return "bg-field";
  if(/GET IT DONE|PAINTING/.test(k)) return "bg-beams";
  if(/WEATHER|7-DAY/.test(k)) return "bg-sky";
  if(/LONG ISLAND/.test(k)) return "bg-waves";
  return "bg-stars";
}
function showSpot(){
  buildSpots();
  if(!spots.length){   // nothing loaded yet — keep the rotation alive
    clearTimeout(spotTimer);
    spotTimer=setTimeout(showSpot,3000);
    return;
  }
  // Night ambient break due? Take it instead of the next page.
  if(ambPending){
    ambPending=false; ambCycles=0;
    if(showAmbient()) return;
  }
  stopVestaboard();   // leaving the quote page mid-flip: kill the clack sound
  stopWorldClock();   // leaving the world clock: stop its 1s tick
  // 3D hand-off: clone the outgoing page so it falls away behind the new one
  {
    const b=$("spotBody");
    if(b.dataset.shown){
      const g=b.cloneNode(true);
      g.removeAttribute("id");
      g.className="spotGhost";
      g.style.top=b.offsetTop+"px";
      g.style.left=b.offsetLeft+"px";
      g.style.width=b.offsetWidth+"px";
      b.parentNode.appendChild(g);
      setTimeout(()=>g.remove(),950);
    }
    b.dataset.shown="1";
  }
  spotIdx=spotIdx%spots.length;
  const s=spots[spotIdx];
  const body=$("spotBody");
  $("spotKicker").style.setProperty("--acc",s.acc);
  document.querySelector("#spotKicker .bar").style.background=s.acc;
  decodeKicker(s.k);                  // scramble→resolve, war-room style
  $("pageBg").className=bgFor(s.k);   // swap the scene backdrop with the page
  $("hudTlm").innerHTML="41.0262N 73.6255W · UTC "
    +new Date().toISOString().slice(11,16)
    +" · FEED "+(spotIdx+1)+"/"+spots.length+" · SIG <b>NOMINAL</b>";
  if(s.html)body.innerHTML=s.body; else body.textContent=s.body.replace(/&amp;/g,"&");
  $("spotSub").textContent=s.sub||"";
  body.classList.remove("fadein");void body.offsetWidth;body.classList.add("fadein");
  $("spotDots").innerHTML=spots.map((_,i)=>`<i class="${i===spotIdx?"on":""}"></i>`).join("");
  if(s.after)s.after();
  spotIdx++;
  // Completed a full rotation? Count it toward the next night ambient break.
  if(spotIdx>=spots.length){
    ambCycles++;
    if(isAmbientHours()&&ambCycles>=CFG.ambientEveryCycles) ambPending=true;
  }
  // Self-scheduling rotation: pages can override the dwell time (the
  // Vestaboard quote page holds ~55s so the flaps get their full settle).
  clearTimeout(spotTimer);
  spotTimer=setTimeout(showSpot,s.dur||CFG.spotSeconds*1000);
}

async function getStock(sym,key,fbSeries,fbQuote,ivSpark){

  if(ivSpark){ try{ pts=await ivSpark(); kind="TODAY"; }catch(e){} }
  try{ q=await yahooQuote(sym); }catch(e){}
  if(!pts||pts.length<2){ try{ pts=await yahooSpark(sym); kind="5-DAY"; }catch(e){} }

  if(!q&&fbQuote){ try{ q=await fbQuote(); }catch(e){} }

      const rows=fbSeries?await fbSeries():[];

  // chart shows today's move too.

  if(q){ S[key]=q; try{localStorage.setItem("mk_"+key,JSON.stringify(q));}catch(e){} }
  else { try{S[key]=JSON.parse(localStorage.getItem("mk_"+key))||S[key];}catch(e){} }
  if(pts&&pts.length>1){ S.sparks[key]=pts; S.sparkKind[key]=kind||"5-DAY";

        localStorage.setItem("mkkind_"+key,S.sparkKind[key]);}catch(e){} }

async function fetchBuoy(){
  // NDBC 44025 (central LIS approaches) realtime feed — fixed-width text.
  // Row format: YY MM DD hh mm WDIR WSPD GST WVHT DPD APD MWD PRES ATMP WTMP …
  if(!PROXY_OK)return;
  try{
    const t=await tget(viaProxy("https://www.ndbc.noaa.gov/data/realtime2/44025.txt"));
    const rows=t.split("\n").filter(l=>l&&!l.startsWith("#"));
    if(!rows.length)return;
    const c=rows[0].trim().split(/\s+/);
    const wvht=parseFloat(c[8]), wtmp=parseFloat(c[14]), pres=parseFloat(c[12]);
    // Barometric tendency: compare against the reading ~3 hours back (the
    // feed carries weeks of history). NWS convention: ±1 hPa/3h = steady.
    let trend=null;
    if(!isNaN(pres)){
      const t0=Date.UTC(+c[0],+c[1]-1,+c[2],+c[3],+c[4]);
      for(const r of rows.slice(1)){
        const d=r.trim().split(/\s+/);
        if(t0-Date.UTC(+d[0],+d[1]-1,+d[2],+d[3],+d[4])>=3*3600*1000){
          const p=parseFloat(d[12]);
          if(!isNaN(p)) trend=pres-p;
          break;
        }
      }
    }
    S.buoy={
      waveFt:isNaN(wvht)?null:(wvht*3.281).toFixed(1),
      waterF:isNaN(wtmp)?null:Math.round(wtmp*9/5+32),
      presInHg:isNaN(pres)?null:(pres*0.02953).toFixed(2),
      presTrend:trend,
    };
    buildDataTicker();
  }catch(e){}
}

async function fetchTraffic(){

      .replace(" mins","m").replace(" min","m").replace(" hours","h").replace(" hour","h");
  };

  }
}
function rssTitles(xml,limit){
  const doc=new DOMParser().parseFromString(xml,"text/xml");
  return [...doc.querySelectorAll("item")].slice(0,limit).map(it=>{
    let t=it.querySelector("title")?.textContent||"";
    const dash=t.lastIndexOf(" - ");
    const src=dash>10?t.slice(dash+3):"";
    if(dash>10)t=t.slice(0,dash);
    return {t,src};
  });
}

  every(fetchApod,6*60*60*1000);   // daily image; DEMO_KEY budget is ample at 4/day

  every(fetchWhoop,30*60*1000);
  every(fetchAlerts,5*60*1000);
  setTimeout(showSpot,1200);

  if(location.hash==="#testwarn")
    takeover("nws","SEVERE THUNDERSTORM WARNING",
      "Severe Thunderstorm Warning for Fairfield County until 8:45 PM",
      "FAIRFIELD COUNTY CT · NATIONAL WEATHER SERVICE",20);
  if(location.hash==="#testbreak")
    takeover("breaking","● BREAKING NEWS",
      "Example breaking headline takes over the entire display",
      "ASSOCIATED PRESS",15);
  if(location.hash==="#testquote")
    setTimeout(()=>{buildSpots();
      spotIdx=Math.max(0,spots.findIndex(s=>s.k==="GET IT DONE"));
      showSpot();},1500);
  if(location.hash==="#testclock")
    setTimeout(()=>{buildSpots();
      spotIdx=Math.max(0,spots.findIndex(s=>s.k==="WORLD CLOCK"));
      showSpot();},1500);
  if(location.hash==="#testtrains")
    setTimeout(()=>{buildSpots();
      spotIdx=Math.max(0,spots.findIndex(s=>s.k==="METRO-NORTH"));
      showSpot();},1500);
  if(location.hash==="#testlis")
    setTimeout(()=>{buildSpots();
      spotIdx=Math.max(0,spots.findIndex(s=>s.k==="LONG ISLAND SOUND"));
      showSpot();},1500);
  if(location.hash==="#testart")
    setTimeout(()=>{buildSpots();
      spotIdx=Math.max(0,spots.findIndex(s=>s.k==="PAINTING OF THE DAY"));
      showSpot();},2500);
  if(location.hash==="#testvolcano") setTimeout(()=>{ambIdx=0;showAmbient();},1500);
  if(location.hash==="#testaurora")  setTimeout(()=>{ambIdx=1;showAmbient();},1500);
  if(location.hash==="#testsolar")   setTimeout(()=>{ambIdx=2;showAmbient();},1500);
})();
